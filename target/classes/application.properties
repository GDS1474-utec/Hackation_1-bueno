server.port=8080

spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:tropelcare}
spring.datasource.username=${DB_USERNAME:tropeluser}
spring.datasource.password=${DB_PASSWORD:tropelpass}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

github.token=${GITHUB_TOKEN:}
github.models.url=${GITHUB_MODELS_URL:https://models.inference.ai.azure.com}
github.models.model-id=${MODEL_ID:gpt-4o-mini}

spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

app.admin.display-name=${ADMIN_NAME:Cameron Walker}
app.admin.email=${ADMIN_EMAIL:cameron@tuckersoft.com}
app.admin.notification-email=${ADMIN_NOTIFICATION_EMAIL:cameron.real@gmail.com}
